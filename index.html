<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — ระบบจองที่พัก</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0D1117;
      --surface: #161B22;
      --surface2: #1C2330;
      --border: #30363D;
      --primary: #58A6FF;
      --primary-dim: rgba(88,166,255,0.12);
      --success: #3FB950;
      --success-dim: rgba(63,185,80,0.12);
      --danger: #F85149;
      --danger-dim: rgba(248,81,73,0.12);
      --warning: #D29922;
      --warning-dim: rgba(210,153,34,0.12);
      --text: #E6EDF3;
      --text-muted: #7D8590;
      --text-dim: #484F58;
      --radius: 10px;
      --font-display: 'Chakra Petch', sans-serif;
      --font-body: 'Sarabun', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    .wrapper {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    header {
      padding: 28px 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo-mark {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--primary), #388BFD);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-title {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
    }
    .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      margin-bottom: 16px;
    }

    .form-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-title::before {
      content: '';
      width: 3px; height: 13px;
      background: var(--primary);
      border-radius: 2px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    @media (max-width: 520px) {
      .form-row { grid-template-columns: 1fr 1fr; }
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    select, input[type="date"], input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 9px 12px;
      width: 100%;
      transition: border-color 0.2s;
      appearance: none;
    }
    select:focus, input:focus {
      outline: none;
      border-color: var(--primary);
    }
    select option { background: #1C2330; }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .btn-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font-body);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.2px;
    }
    .btn-approve {
      background: var(--success-dim);
      color: var(--success);
      border: 1px solid rgba(63,185,80,0.25);
    }
    .btn-approve:hover { background: rgba(63,185,80,0.2); }
    .btn-approve:active { transform: scale(0.97); }

    .btn-reject {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid rgba(248,81,73,0.25);
    }
    .btn-reject:hover { background: rgba(248,81,73,0.2); }
    .btn-reject:active { transform: scale(0.97); }

    .btn-action:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

    .btn-action .spinner {
      width: 13px; height: 13px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-action.loading .spinner { display: block; }
    .btn-action.loading .label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .preview-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 14px;
      font-size: 13px;
      color: var(--text-muted);
      display: none;
    }
    .preview-box.show { display: block; }
    .preview-box .preview-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .preview-cmd {
      color: var(--primary);
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
    }

    .config-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .config-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    .config-row:last-child { margin-bottom: 0; }
    .config-row label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .config-saved {
      font-size: 11px;
      color: var(--success);
      margin-top: 2px;
      display: none;
    }
    .config-saved.show { display: block; }

    .btn-save {
      background: var(--primary-dim);
      color: var(--primary);
      border: 1px solid rgba(88,166,255,0.25);
      border-radius: 7px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 14px;
    }
    .btn-save:hover { background: rgba(88,166,255,0.2); }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 9px 12px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      z-index: 99;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(63,185,80,0.4); }
    #toast.error   { border-color: rgba(248,81,73,0.4); }
  </style>
</head>
<body>

<div class="wrapper">

  <header>
    <div class="header-left">
      <div class="logo-mark">🏨</div>
      <div>
        <div class="header-title">Admin Panel</div>
        <div class="header-sub">ระบบช่วยส่งข้อความของแอดมิน</div>
      </div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('action')">ส่งคำสั่ง</button>
    <button class="tab" onclick="switchTab('config')">ตั้งค่า</button>
  </div>

  <div class="tab-content active" id="tab-action">
    <div class="form-card">
      <div class="form-title">อนุมัติ / ปฏิเสธการจอง</div>

      <div class="form-row">
        <div class="form-group">
          <label>ห้อง</label>
          <select id="selRoom" onchange="updatePreview()">
            <option value="A">ห้อง A</option>
            <option value="B">ห้อง B</option>
            <option value="C">ห้อง C</option>
          </select>
        </div>
        <div class="form-group">
          <label>วันเช็คอิน</label>
          <input type="date" id="inDate" onchange="updatePreview()">
        </div>
        <div class="form-group">
          <label>ชื่อลูกค้า (ไม่บังคับ)</label>
          <input type="text" id="inName" placeholder="เช่น สมชาย" oninput="updatePreview()">
        </div>
      </div>

      <div class="preview-box" id="previewBox">
        <div class="preview-label">คำสั่งที่จะส่ง LINE</div>
        <div class="preview-cmd" id="previewCmd">—</div>
      </div>

      <div class="btn-row">
        <button class="btn-action btn-approve" id="btnApprove" onclick="sendAction('approve')">
          <span class="spinner"></span>
          <span class="label">✅ อนุมัติ</span>
        </button>
        <button class="btn-action btn-reject" id="btnReject" onclick="sendAction('reject')">
          <span class="spinner"></span>
          <span class="label">❌ ปฏิเสธ</span>
        </button>
      </div>

      <!-- ✅ ปุ่มใหม่ -->
      <div class="btn-row">
        <button class="btn-action" id="btnPending" onclick="sendPending()"
          style="background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(210,153,34,0.25);">
          <span class="spinner"></span>
          <span class="label">📋 รายการรอตรวจสอบ</span>
        </button>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<!-- แก้แค่ส่วน script ด้านล่างนี้จากของคุณ -->

<script>
function getCommand(action) {
  const room = document.getElementById('selRoom').value;
  const date = document.getElementById('inDate').value;
  const name = document.getElementById('inName').value;

  const verb = action === 'approve' ? 'อนุมัติ' : 'ปฏิเสธ';

  let text = `${verb} : ${room} | ${date}`;
  if (name) text += ` | ${name}`;

  return text;
}

function sendAction(action) {
  const date = document.getElementById('inDate').value;
  if (!date) {
    alert('กรุณาเลือกวัน');
    return;
  }

  const text = getCommand(action);

  const url = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

function sendPending() {
  const text = "รายการรอตรวจสอบ";
  const url = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}
</script>
</body>
</html>
